<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Validade - Alternativa</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
  <div class="bg"></div>
  <div class="container">
    <img src="assets/logo.webp" alt="Logo Prefeitura" class="logo">
    <h1>Nova Alternativa Distribuidora</h1>
    <h2>Controle de Validade</h2>
    <p>Beaver Soluções em Tecnologia</p>

<form id="formControledeValidade">

    <div class="field-group">
        <label for="codbarras">Código de Barras</label>
        <input type="text" id="codbarras" name="codbarras" placeholder="Passe o produto no leitor ou digite o código de barras" required>
        <label for="codigo">Código do Produto</label>
        <input type="text" id="codigo" name="codigo" placeholder="Código do Produto" required>
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" placeholder="Descrição do Produto" required>

    
    </div>

  <button type="submit">Confirmar</button>
</form>

  <div id="status" class="hidden">
    ✅ Validade lançada com sucesso!<br>
    
  </div>



  <script src="script.js"></script>
</body>

</html>
